name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mietwerk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # Env validation is skipped here; we only need a syntactically valid URL.
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/mietwerk"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `postinstall` runs `prisma generate`, producing the typed client.
      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npm run db:push

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Includes the cross-tenant isolation integration test (needs the DB).
      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mietwerk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/mietwerk"
      AUTH_SECRET: "ci-test-secret-not-used-in-production"
      AUTH_GITHUB_ID: "ci-placeholder"
      AUTH_GITHUB_SECRET: "ci-placeholder"
      EMAIL_FROM: "Mietwerk <no-reply@mietwerk.local>"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npm run db:push

      - name: Seed demo data (owner used by the E2E login)
        run: npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
