# Local development services for Mietwerk.
# Start with: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: mietwerk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mietwerk
    ports:
      - "5432:5432"
    volumes:
      - mietwerk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mietwerk"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local SMTP catcher for the NextAuth email (magic link) provider.
  # Web UI available at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: mietwerk-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  # S3-compatible object storage for documents & photos.
  # Console: http://localhost:9001 (user/pass: minioadmin/minioadmin)
  minio:
    image: minio/minio:latest
    container_name: mietwerk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - mietwerk-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket on startup so the app can use it immediately.
  minio-init:
    image: minio/mc:latest
    container_name: mietwerk-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/mietwerk;
      mc anonymous set none local/mietwerk;
      echo 'MinIO bucket mietwerk ready';
      "

volumes:
  mietwerk-postgres-data:
  mietwerk-minio-data:
